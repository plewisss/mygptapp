databases:
  - name: cabsi-db
    plan: free
    databaseName: cabsi
    user: cabsi

services:
  - type: web
    name: cabsi-app
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: APP_USERNAME
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: APP_ADDITIONAL_USERS
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cabsi-db
          property: connectionString
